async function loadJSON(url) {
  try {
    const separator = url.includes('?') ? '&' : '?';
    const bustUrl = url + separator + '_t=' + Date.now();
    const r = await fetch(bustUrl);
    if (!r.ok) {
      console.error('fetch failed:', url, r.status, r.statusText);
      return null;
    }
    const data = await r.json();
    return data;
  } catch (e) {
    console.error('loadJSON error:', url, e);
    return null;
  }
}

function dimClass(label) {
  if (!label) return 'dim-medium';
  const l = label.toLowerCase();
  if (l === 'strong' || l === 'leader') return 'dim-strong';
  if (l === 'weak' || l === 'laggard' || l === 'concept_only') return 'dim-weak';
  return 'dim-medium';
}

function bucketClass(bucket) {
  if (bucket === 'A') return 'bucket-A';
  if (bucket === 'B') return 'bucket-B';
  return 'bucket-C';
}

function scoreClass(score) {
  if (score >= 80) return 'score-high';
  if (score >= 60) return 'score-mid';
  return 'score-low';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatPct(v) {
  if (v === null || v === undefined || v === '') return '-';
  const n = Number(v);
  if (!Number.isFinite(n)) return esc(v);
  return `${n.toFixed(2)}%`;
}

function findThresholdStat(signal, threshold) {
  const stats = signal.threshold_stat_list || [];
  return stats.find(item => Number(item.threshold_pct) === Number(threshold));
}

function renderIntradayStopLoss(signal) {
  if (!signal) return '';
  const optimal = formatPct(signal.optimal_stop_loss_pct);
  const expected = formatPct(signal.optimal_expected_value_pct);
  const confidence = signal.confidence_label || signal.status || '';
  const stat = findThresholdStat(signal, signal.optimal_stop_loss_pct) || {};
  const triggerText = stat.trigger_count !== undefined ? `触发 ${stat.trigger_count} 次` : '';
  const continueDown = stat.continue_down_probability !== undefined
    ? `继续下跌概率 ${formatPct(Number(stat.continue_down_probability) * 100)}`
    : '';
  const recovery = stat.v_recovery_probability !== undefined
    ? `V回概率 ${formatPct(Number(stat.v_recovery_probability) * 100)}`
    : '';
  return `
    <div class="stoploss-box">
      <span class="label">统计止损:</span> ${optimal} &nbsp;|&nbsp;
      <span class="label">期望值:</span> ${expected} &nbsp;|&nbsp;
      <span class="label">置信度:</span> ${esc(confidence)}<br>
      ${esc([triggerText, continueDown, recovery].filter(Boolean).join('；'))}
      ${signal.reason_text ? `<div style="margin-top:4px;color:var(--text2)">${esc(signal.reason_text)}</div>` : ''}
    </div>`;
}

function findOpenDipSignal(stockCode, openDipData) {
  const db = openDipData && openDipData.open_dip_buy_db ? openDipData.open_dip_buy_db : {};
  const record = db[String(stockCode || '').trim()] || {};
  return record.open_dip_buy_signal || record;
}

function buildOpenDipReasonText(signal, stat) {
  if (signal.reason_text) return signal.reason_text;
  const lookback = signal.lookback_trade_day_count;
  const threshold = formatPct(signal.optimal_open_dip_buy_pct);
  const triggerCount = stat.trigger_count;
  const triggerProbability = stat.trigger_probability !== undefined
    ? formatPct(Number(stat.trigger_probability) * 100)
    : '-';
  const avgReturn = formatPct(stat.avg_next_close_return_pct);
  const entryCost = formatPct(signal.entry_cost_pct);
  const netReturn = formatPct(stat.avg_next_close_net_return_pct);
  const executionExpected = formatPct(stat.execution_expected_return_pct);
  const winRate = stat.next_close_win_rate !== undefined
    ? formatPct(Number(stat.next_close_win_rate) * 100)
    : '-';
  return `近${lookback || '-'}个交易日样本中，开盘后触发${threshold}低吸阈值的次数为${triggerCount || 0}，触发概率为${triggerProbability}；按该阈值买入并持有到下一交易日收盘的平均收益为${avgReturn}，扣除${entryCost}买入损耗后的平均净收益为${netReturn}，按触发概率加权后的执行期望为${executionExpected}，下一交易日收盘胜率为${winRate}。`;
}

function renderOpenDipSignal(stock, openDipData) {
  const signal = findOpenDipSignal(stock.stock_code, openDipData);
  if (!signal || signal.optimal_open_dip_buy_pct === undefined || signal.optimal_open_dip_buy_pct === null) return '';
  const optimal = formatPct(signal.optimal_open_dip_buy_pct);
  const netReturn = formatPct(signal.optimal_next_close_net_return_pct);
  const executionExpected = formatPct(signal.optimal_execution_expected_return_pct);
  const confidence = signal.confidence_label || signal.status || '';
  const stat = findThresholdStat(signal, signal.optimal_open_dip_buy_pct) || {};
  const reasonText = buildOpenDipReasonText(signal, stat);
  return `
    <div class="open-dip-box">
      <span class="label">统计低吸:</span> ${optimal} &nbsp;|&nbsp;
      <span class="label">单次净收益:</span> ${netReturn} &nbsp;|&nbsp;
      <span class="label">执行期望:</span> ${executionExpected} &nbsp;|&nbsp;
      <span class="label">置信度:</span> ${esc(confidence)}
      ${reasonText ? `<div style="margin-top:4px;color:var(--text2)">${esc(reasonText)}</div>` : ''}
    </div>`;
}

function renderCANSLIM(verdict) {
  if (!verdict) return '';
  const dims = [
    ['C', verdict.C_current_earnings],
    ['A', verdict.A_annual_growth],
    ['N', verdict.N_new_factor],
    ['S', verdict.S_supply_demand],
    ['L', verdict.L_leader_laggard],
    ['I', verdict.I_institutional_sponsorship],
    ['M', verdict.M_market_theme],
  ];
  return '<div class="canslim-row">' + dims.map(([k,v]) =>
    `<span class="canslim-dim ${dimClass(v)}">${k}: ${esc(v)}</span>`
  ).join('') + '</div>';
}

function formatTargetRange(targetRange) {
  if (!targetRange) return '证据不足';
  const low = targetRange.low === null || targetRange.low === undefined
    ? NaN : Number(targetRange.low);
  const high = targetRange.high === null || targetRange.high === undefined
    ? NaN : Number(targetRange.high);
  const center = targetRange.center === null || targetRange.center === undefined
    ? NaN : Number(targetRange.center);
  const currency = targetRange.currency || 'CNY';
  if (Number.isFinite(low) && Number.isFinite(high)) {
    return `${low}-${high} ${esc(currency)}`;
  }
  if (Number.isFinite(center)) return `${center} ${esc(currency)}`;
  return '证据不足';
}

function renderCalculatorTargetPrice(calculatorSignal, judgment) {
  if (!calculatorSignal && !judgment) return '';
  const signal = calculatorSignal || {};
  const targetRange = signal.predicted_target_price_range || {};
  const upsideRange = signal.predicted_upside_pct_range || {};
  const currentPrice = signal.current_price;
  const confidence = signal.confidence_label || 'insufficient_data';
  const reasonText = signal.reason_text || '';
  const validation = signal.expert_target_validation_signal || {};
  const validationText = validation.training_usage_text
    ? `<div class="target-price-meta">${esc(validation.training_usage_text)}</div>`
    : '';
  return `
    <div class="target-price-box calculator">
      <div class="target-price-title">Calculator 目标区间 · ${esc(confidence)}</div>
      <div>${formatTargetRange(targetRange)}</div>
      <div class="target-price-meta">
        当前价: ${currentPrice === null || currentPrice === undefined ? '缺失' : esc(currentPrice)}
        ${upsideRange.low !== undefined && upsideRange.high !== undefined ? ` · 参考涨幅: ${formatPct(upsideRange.low)}-${formatPct(upsideRange.high)}` : ''}
      </div>
      ${reasonText ? `<div class="target-price-meta">${esc(reasonText)}</div>` : ''}
      ${validationText}
    </div>`;
}

function renderTargetPriceJudgment(judgment, calculatorSignal) {
  if (!judgment && !calculatorSignal) return '';
  judgment = judgment || {};
  const expert = judgment.institutional_expert_view || {};
  const expertFreshness = expert.evidence_freshness_label === 'older_half_year_reference'
    ? ' · 较旧参考'
    : '';
  return `
    <div class="target-price-grid">
      <div class="target-price-box">
        <div class="target-price-title">投研团队目标区间 · ${esc(expert.level || 'insufficient_data')}${expertFreshness}</div>
        <div>${formatTargetRange(expert.target_price_range)}</div>
        ${expert.source_name ? `<div class="target-price-meta">来源: ${esc(expert.source_name)} · ${esc(expert.source_observed_at)}${expert.evidence_age_days !== null && expert.evidence_age_days !== undefined && Number.isFinite(Number(expert.evidence_age_days)) ? ` · 距今 ${esc(expert.evidence_age_days)} 天` : ''}</div>` : ''}
        ${expert.reason_text ? `<div class="target-price-meta">${esc(expert.reason_text)}</div>` : ''}
      </div>
      ${renderCalculatorTargetPrice(calculatorSignal, judgment)}
    </div>
    ${judgment.comparison_text ? `<div class="target-price-meta">区间比较: ${esc(judgment.comparison_text)}</div>` : ''}
  `;
}

function renderStock(stock, openDipData) {
  const rank = stock.final_rank || 0;
  const verdict = stock.oneil_canslim_verdict || {};
  const why = stock.why_selected || [];
  const risk = stock.risk_judgment || {};
  const op = stock.operation_view || {};
  const stopLossSignal = stock.intraday_stop_loss_signal || null;
  const themes = stock.matched_theme_list || [];
  const gaps = stock.evidence_gap || [];
  const targetPriceJudgment = stock.target_price_judgment || null;
  const calculatorSignal = stock.oneil_calculator_signal || null;

  return `
  <div class="card">
    <div class="card-header">
      <span class="rank-badge ${rank <= 3 ? 'rank-' + rank : ''}">${rank}</span>
      <span class="stock-name">${esc(stock.stock_name)}</span>
      <span class="stock-code">${esc(stock.stock_code)}</span>
      <span class="score-badge ${scoreClass(stock.oneil_candidate_score)}">O'Neil ${stock.oneil_candidate_score}</span>
      <span class="score-badge ${bucketClass(stock.final_bucket)}">Bucket ${stock.final_bucket}</span>
      <span class="score-badge" style="background:rgba(188,140,255,0.12);color:var(--purple)">SS ${stock.selection_score}</span>
    </div>
    <div style="margin-bottom:6px">${themes.map(t => `<span class="theme-tag">${esc(t)}</span>`).join('')}
      <span class="theme-tag" style="background:rgba(240,136,62,0.12);color:var(--orange)">${esc(stock.primary_theme)}</span>
    </div>
    ${renderCANSLIM(verdict)}
    ${renderTargetPriceJudgment(targetPriceJudgment, calculatorSignal)}
    <div class="collapsible" onclick="toggleCollapse(this)">
      <strong style="font-size:0.85em">入选理由</strong><span class="collapse-icon">▶</span>
    </div>
    <div class="collapsible-content">
      <div class="why-list">${why.map(w => `<div class="why-item">${esc(w)}</div>`).join('')}</div>
      ${risk.main_risk_text ? `<div class="risk-text">⚠ ${esc(risk.main_risk_text)}</div>` : ''}
      <div class="operation-box">
        <span class="label">操作:</span> ${esc(op.action)}<br>
        <span class="label">失效:</span> ${esc(op.invalid_condition)}
      </div>
      ${renderOpenDipSignal(stock, openDipData)}
      ${renderIntradayStopLoss(stopLossSignal)}
      ${gaps.length ? `<div style="margin-top:6px;font-size:0.72em;color:var(--yellow)">证据缺口: ${gaps.map(g => esc(g)).join('；')}</div>` : ''}
    </div>
  </div>`;
}

function renderRejected(stocks) {
  if (!stocks || !stocks.length) return '';
  return `
  <div class="section">
    <h2 class="collapsible" onclick="toggleCollapse(this)">淘汰候选 (${stocks.length})<span class="collapse-icon">▶</span></h2>
    <div class="collapsible-content">
      <table class="rejected-table">
        <tr><th>股票</th><th>O'Neil分</th><th>SS</th><th>主线</th><th>淘汰原因</th></tr>
        ${stocks.map(s => `<tr>
          <td>${esc(s.stock_name)}<br><span style="color:var(--text2)">${esc(s.stock_code)}</span></td>
          <td>${s.oneil_candidate_score || '-'}</td>
          <td>${s.selection_score || '-'}</td>
          <td>${esc(s.primary_theme)}</td>
          <td style="max-width:300px">${esc(s.main_reject_reason)}</td>
        </tr>`).join('')}
      </table>
    </div>
  </div>`;
}

function renderThemes(themeData) {
  if (!themeData) return '';
  const themes = themeData.theme_list || [];
  if (!themes.length) return '';
  return `
  <div class="section">
    <h2>周度主线</h2>
    <div class="theme-bar">
      ${themes.map(t => `<div class="theme-card">
        <div class="theme-rank">#${t.rank_no}</div>
        <div class="theme-name">${esc(t.theme_name)}</div>
        <div class="theme-type">${esc(t.strength_level)}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderFutureEvents(futureData) {
  if (!futureData) return '';
  const root = futureData.future_events_scan_result;
  if (!root) return '';
  const events = root.event_list || [];
  if (!events.length) return '';
  return `
  <div class="section">
    <h2>下月前瞻事件 (${esc(root.target_month)})</h2>
    <div class="event-list">
      ${events.map(e => `<div class="event-item">
        <span class="event-date">${esc(e.event_date)}</span>
        <span class="event-name">${esc(e.event_name)}</span>
        <span class="event-themes">${(e.catalyzed_theme_list||[]).map(t => esc(t.catalyzed_theme_name)).join('、')}</span>
      </div>`).join('')}
    </div>
    <div style="margin-top:6px;font-size:0.75em;color:var(--text2)">${esc(root.summary_text)}</div>
  </div>`;
}

function toggleCollapse(el) {
  const content = el.nextElementSibling;
  const icon = el.querySelector('.collapse-icon');
  if (content.classList.contains('open')) {
    content.classList.remove('open');
    if (icon) icon.textContent = '▶';
  } else {
    content.classList.add('open');
    if (icon) icon.textContent = '▼';
  }
}

function render() {
  const data = INLINE_ONEIL;
  const stockSelectionData = null;
  const futureData = INLINE_FUTURE;
  const themeData = INLINE_THEME;
  const openDipData = INLINE_OPEN_DIP;

  const app = document.getElementById('app');

  if (!data) {
    app.innerHTML = '<p style="color:var(--red)">无法加载数据，请确认 JSON 文件是否存在。</p>';
    return;
  }

  const root = data.oneil_top_stock_selection_result || {};
  const selected = root.selected_top_8 || [];
  const rejected = root.rejected_stocks || [];
  const summary = root.selection_summary || {};
  const sourceDate = root.source_result_date || '';
  const stockSelectionRoot = stockSelectionData ? (stockSelectionData.stock_selection_result || {}) : {};
  const stockSelectionDate = extractStockSelectionDate(stockSelectionRoot);
  const isFresh = !stockSelectionDate || !sourceDate || stockSelectionDate === sourceDate;
  const freshnessClass = isFresh ? 'freshness-ok' : 'freshness-warn';
  const freshnessText = isFresh
    ? 'O’Neil 已对齐最新粗筛'
    : `注意：最新粗筛为 ${stockSelectionDate}，O’Neil 仍为 ${sourceDate}`;

  let html = `
    <h1>O'Neil / CAN SLIM Top 8</h1>
    <div class="subtitle">
      数据日期: ${esc(sourceDate)} &nbsp;|&nbsp; 交易周: ${esc(root.trade_week)} &nbsp;|&nbsp;
      候选池: ${root.source_candidate_count}只 → 入选: ${root.selected_count}只
      ${stockSelectionDate ? `&nbsp;|&nbsp; 最新粗筛: ${esc(stockSelectionDate)}` : ''}
      &nbsp;|&nbsp; <span class="${freshnessClass}">${esc(freshnessText)}</span>
    </div>`;

  html += renderThemes(themeData);
  html += renderFutureEvents(futureData);

  html += `<div class="section"><h2>入选 Top 8</h2>`;
  html += selected.map(s => renderStock(s, openDipData)).join('');
  html += `</div>`;

  html += renderRejected(rejected);

  if (summary.summary_text) {
    html += `<div class="section"><div class="card" style="font-size:0.8em;color:var(--text2)">${esc(summary.summary_text)}</div></div>`;
  }

  html += `<div class="footer">大A智能体 · O'Neil/CAN SLIM 研究系统 · 数据仅供参考，不构成投资建议</div>`;

  app.innerHTML = html;
}

function extractStockSelectionDate(stockSelectionRoot) {
  if (!stockSelectionRoot) return '';
  if (stockSelectionRoot.published_source_date) return stockSelectionRoot.published_source_date;
  if (stockSelectionRoot.source_result_date) return stockSelectionRoot.source_result_date;
  const tradeWeek = stockSelectionRoot.trade_week || '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(tradeWeek)) return tradeWeek;
  const candidates = stockSelectionRoot.candidate_stock_list || [];
  const firstCandidate = candidates[0] || {};
  const sourceDate = firstCandidate.source_result_date || '';
  return sourceDate;
}

render();
</script>
</body>
</html>
