<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --orange: #f0883e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}
h1 { font-size: 1.5em; margin-bottom: 4px; }
h2 { font-size: 1.15em; margin-bottom: 12px; color: var(--blue); }
.subtitle { color: var(--text2); font-size: 0.85em; margin-bottom: 20px; }
.section { margin-bottom: 28px; }
.card {

  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}
.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.rank-badge {
  background: var(--blue);
  color: #fff;
  font-weight: 700;
  font-size: 0.8em;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.rank-badge.rank-1 { background: #f0883e; }
.rank-badge.rank-2 { background: #8b949e; }
.rank-badge.rank-3 { background: #a0522d; }
.stock-name { font-size: 1.1em; font-weight: 600; }
.stock-code { color: var(--text2); font-size: 0.8em; }
.score-badge {
  font-size: 0.75em;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
}
.score-high { background: rgba(63,185,80,0.15); color: var(--green); }
.score-mid { background: rgba(210,153,34,0.15); color: var(--yellow); }
.score-low { background: rgba(248,81,73,0.15); color: var(--red); }
.bucket-A { background: rgba(63,185,80,0.15); color: var(--green); }
.bucket-B { background: rgba(210,153,34,0.15); color: var(--yellow); }
.bucket-C { background: rgba(248,81,73,0.15); color: var(--red); }
.theme-tag {
  display: inline-block;
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(88,166,255,0.12);
  color: var(--blue);
  margin: 2px 2px;
}
.canslim-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin: 8px 0;
}
.canslim-dim {
  font-size: 0.7em;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
}
.dim-strong { background: rgba(63,185,80,0.15); color: var(--green); }
.dim-medium { background: rgba(210,153,34,0.15); color: var(--yellow); }
.dim-weak { background: rgba(248,81,73,0.15); color: var(--red); }
.dim-leader { background: rgba(63,185,80,0.15); color: var(--green); }
.dim-laggard { background: rgba(248,81,73,0.15); color: var(--red); }
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}
.detail-item {
  font-size: 0.78em;
  color: var(--text2);
}
.detail-item strong { color: var(--text); font-weight: 500; }
.why-list { margin-top: 6px; }
.why-item {
  font-size: 0.78em;
  color: var(--text2);
  padding: 3px 0 3px 12px;
  position: relative;
}
.why-item::before {
  content: '•';
  position: absolute;
  left: 0;
  color: var(--blue);
}
.risk-text { color: var(--red); font-size: 0.78em; margin-top: 4px; }
.operation-box {
  background: rgba(88,166,255,0.06);
  border-left: 3px solid var(--blue);
  padding: 8px 12px;
  margin-top: 8px;
  font-size: 0.78em;
}
.operation-box .label { color: var(--blue); font-weight: 600; }
.target-price-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.target-price-box {
  background: rgba(88,166,255,0.06);
  border-left: 3px solid var(--blue);
  padding: 8px 12px;
  font-size: 0.78em;
}
.target-price-box.calculator {
  background: rgba(63,185,80,0.06);
  border-left-color: var(--green);
}
.target-price-title {
  color: var(--blue);
  font-weight: 600;
  margin-bottom: 4px;
}
.target-price-box.calculator .target-price-title { color: var(--green); }
.target-price-meta { color: var(--text2); margin-top: 4px; }
.ai-pref-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.6fr) minmax(280px, 0.9fr);
  gap: 16px;
  align-items: start;
}
.ai-pref-sidebar {
  position: sticky;
  top: 16px;
}
.ai-pref-sidebar-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
}
.ai-pref-sidebar-item {
  padding: 10px 0;
  border-bottom: 1px solid rgba(48,54,61,0.4);
}
.ai-pref-sidebar-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}
.ai-pref-sidebar-rank {
  color: var(--orange);
  font-size: 0.75em;
  font-weight: 700;
}
.ai-pref-sidebar-name {
  font-weight: 600;
}
.ai-pref-sidebar-meta {
  color: var(--text2);
  font-size: 0.76em;
  margin-top: 3px;
}
@media (max-width: 700px) {
  .target-price-grid { grid-template-columns: 1fr; }
  .ai-pref-layout { grid-template-columns: 1fr; }
  .ai-pref-sidebar { position: static; }
}
.stoploss-box,
.open-dip-box,
.takeprofit-box {
  background: rgba(210,153,34,0.06);
  border-left: 3px solid var(--yellow);
  padding: 8px 12px;
  margin-top: 8px;
  font-size: 0.78em;
}
.stoploss-box {
  background: rgba(63,185,80,0.06);
  border-left-color: var(--green);
}
.stoploss-box .label { color: var(--green); font-weight: 600; }

.takeprofit-box .label { color: var(--blue); font-weight: 600; }
.freshness-ok { color: var(--green); }
.freshness-warn { color: var(--yellow); }

  padding: 8px;

  color: var(--text2);
  font-weight: 500;

.theme-name { font-weight: 600; margin: 2px 0; }
.theme-type { font-size: 0.7em; color: var(--text2); }
.event-list { margin-top: 8px; }
.event-item {

.event-name { color: var(--text); }
.event-themes { color: var(--blue); }
.stock-search-panel {

  border-radius: 8px;
  padding: 14px;

.stock-search-row {

  border: 1px solid var(--border);
  border-radius: 6px;
  background: #0d1117;
  color: var(--text);
  padding: 9px 10px;
  font-size: 0.9em;
  outline: none;

.stock-search-input:focus { border-color: var(--blue); }
.stock-search-button {
  border: 1px solid var(--blue);
  border-radius: 6px;
  background: rgba(88,166,255,0.12);
  color: var(--blue);
  padding: 8px 14px;
  font-weight: 600;
  cursor: pointer;

.stock-search-button:hover { background: rgba(88,166,255,0.2); }
.stock-search-hint {
  color: var(--text2);
  font-size: 0.76em;
  margin-top: 8px;

.stock-search-result { margin-top: 12px; }
.stock-library-grid {

  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 8px;

.stock-library-box {

  border-radius: 6px;
  padding: 10px;

.stock-library-title {

  font-weight: 700;

.stock-library-meta {

  font-size: 0.92em;
  margin-bottom: 4px;

.stock-library-text { color: var(--text2); }

  padding: 1px 7px;
  margin: 1px 2px 1px 0;
  background: rgba(88,166,255,0.12);
  color: var(--blue);
  font-size: 0.86em;
}
.board-stock-grid {

  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;

.board-stock-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;

.board-stock-meta {
  color: var(--text2);
  font-size: 0.76em;
  margin: 4px 0;

.board-stock-line {
  color: var(--text2);
  font-size: 0.76em;
  margin-top: 5px;

.board-stock-reason {
  color: var(--text2);
  font-size: 0.76em;
  margin-top: 8px;

.board-stock-risk {
  color: var(--yellow);
  font-size: 0.76em;
  margin-top: 5px;

.board-stock-details {
  margin-top: 8px;
  border-top: 1px solid rgba(48,54,61,0.55);
  padding-top: 6px;

.board-stock-details summary {

  font-weight: 600;

.footer { text-align: center; color: var(--text2); font-size: 0.7em; margin-top: 30px; padding: 20px 0; border-top: 1px solid var(--border); }
.collapsible { cursor: pointer; user-select: none; }

.collapsible-content { display: none; }

.collapse-icon { font-size: 0.7em; color: var(--text2); margin-left: 4px; }

  .detail-grid { grid-template-columns: 1fr; }
  .stock-library-grid { grid-template-columns: 1fr; }
  .board-stock-grid { grid-template-columns: 1fr; }
  body { padding: 12px; }
}

async function loadJSON(url) {
  try {
    const separator = url.includes('?') ? '&' : '?';
    const bustUrl = url + separator + '_t=' + Date.now();
    const r = await fetch(bustUrl);
    if (!r.ok) {
      console.error('fetch failed:', url, r.status, r.statusText);
      return null;
    }
    const data = await r.json();
    return data;
  } catch (e) {
    console.error('loadJSON error:', url, e);
    return null;
  }
}

function dimClass(label) {
  if (!label) return 'dim-medium';
  const l = label.toLowerCase();
  if (l === 'strong' || l === 'leader') return 'dim-strong';
  if (l === 'weak' || l === 'laggard' || l === 'concept_only') return 'dim-weak';
  return 'dim-medium';
}

function bucketClass(bucket) {
  if (bucket === 'A') return 'bucket-A';
  if (bucket === 'B') return 'bucket-B';
  return 'bucket-C';
}

function scoreClass(score) {
  if (score >= 80) return 'score-high';
  if (score >= 60) return 'score-mid';
  return 'score-low';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getPublishedUpdateTime() {
  const generatedAt = INLINE_PUBLISH_GENERATED_AT && INLINE_PUBLISH_GENERATED_AT.generated_at
    ? INLINE_PUBLISH_GENERATED_AT.generated_at
    : '';
  if (generatedAt) return generatedAt;
  return new Date().toLocaleString('zh-CN', { hour12: false });
}

function formatPct(v) {
  if (v === null || v === undefined || v === '') return '-';
  const n = Number(v);
  if (!Number.isFinite(n)) return esc(v);
  return `${n.toFixed(2)}%`;
}

function findThresholdStat(signal, threshold) {
  const stats = signal.threshold_stat_list || [];
  return stats.find(item => Number(item.threshold_pct) === Number(threshold));
}

function renderIntradayStopLoss(signal) {
  if (!signal) return '';
  const optimal = formatPct(signal.optimal_stop_loss_pct);
  const expected = formatPct(signal.optimal_expected_value_pct);
  const confidence = signal.confidence_label || signal.status || '';
  const stat = findThresholdStat(signal, signal.optimal_stop_loss_pct) || {};
  const triggerText = stat.trigger_count !== undefined ? `触发 ${stat.trigger_count} 次` : '';
  const continueDown = stat.continue_down_probability !== undefined
    ? `继续下跌概率 ${formatPct(Number(stat.continue_down_probability) * 100)}`
    : '';
  const recovery = stat.v_recovery_probability !== undefined
    ? `V回概率 ${formatPct(Number(stat.v_recovery_probability) * 100)}`
    : '';
  return `
    <div class="stoploss-box">
      <span class="label">统计止损:</span> ${optimal} &nbsp;|&nbsp;
      <span class="label">期望值:</span> ${expected} &nbsp;|&nbsp;
      <span class="label">置信度:</span> ${esc(confidence)}<br>
      ${esc([triggerText, continueDown, recovery].filter(Boolean).join('；'))}
      ${signal.reason_text ? `<div style="margin-top:4px;color:var(--text2)">${esc(signal.reason_text)}</div>` : ''}
    </div>`;
}

function buildOpenDipReasonText(signal, stat) {
  const lookback = signal.lookback_trade_day_count;
  const threshold = formatPct(signal.optimal_open_dip_buy_pct);
  const triggerCount = stat.trigger_count;
  const triggerProbability = stat.trigger_probability !== undefined
    ? formatPct(Number(stat.trigger_probability) * 100)
    : '-';
  const avgReturn = formatPct(stat.avg_5d_close_return_pct);
  const entryCost = formatPct(signal.entry_cost_pct);
  const netReturn = formatPct(stat.avg_5d_close_net_return_pct);
  const executionExpected = formatPct(stat.swing_execution_expected_return_pct);
  const reboundRate = stat.same_day_rebound_probability !== undefined
    ? formatPct(Number(stat.same_day_rebound_probability) * 100)

  return `近${lookback || '-'}个交易日样本中，开盘后触发${threshold}低吸阈值的次数为${triggerCount || 0}，触发概率为${triggerProbability}；按该阈值买入并持有到T+5收盘的平均收益为${avgReturn}，扣除${entryCost}买入损耗后的T+5平均净收益为${netReturn}，按触发概率加权后的T+5执行期望为${executionExpected}，当日收盘高于开盘概率为${reboundRate}。`;

    ? NaN : Number(targetRange.high);
  const center = targetRange.center === null || targetRange.center === undefined
    ? NaN : Number(targetRange.center);
  const currency = targetRange.currency || 'CNY';
  if (Number.isFinite(low) && Number.isFinite(high)) {
    return `${low}-${high} ${esc(currency)}`;
  }
  if (Number.isFinite(center)) return `${center} ${esc(currency)}`;
  return '证据不足';
}

function buildSearchLibrary(root, searchIndexData) {
  const searchMap = {};
  function ensureStock(stockCode, stockName) {
    const code = String(stockCode || '').trim();
    if (!code) return null;
    if (!searchMap[code]) {
      searchMap[code] = { stock_code: code, stock_name: stockName || '', top_stock: null };
    }
    if (stockName && !searchMap[code].stock_name) searchMap[code].stock_name = stockName;
    return searchMap[code];
  }
  (root.selected_top_8 || []).forEach(stock => {
    const item = ensureStock(stock.stock_code, stock.stock_name);
    if (item) item.top_stock = stock;
  });
  ((searchIndexData && searchIndexData.stock_list) || []).forEach(stock => {
    ensureStock(stock.stock_code, stock.stock_name);
  });
  return searchMap;
}

function findStockInSearchLibrary(query, searchLibrary) {
  const q = normalizeSearchText(query);
  if (!q) return null;
  if (searchLibrary[q]) return searchLibrary[q];
  const stockList = Object.values(searchLibrary);
  return stockList.find(item => normalizeSearchText(item.stock_name) === q)
    || stockList.find(item => normalizeSearchText(item.stock_code).includes(q))
    || stockList.find(item => normalizeSearchText(item.stock_name).includes(q))
    || null;
}

function formatStructuredResearchValue(key, value) {
  if (!value || typeof value !== 'object') return value;
  if (key === 'relative_strength_signal') {
    const parts = [
      value.rs_composite_rank !== undefined ? `综合RS ${value.rs_composite_rank}` : '',
      value.rs_rank_20d !== undefined ? `20日 ${value.rs_rank_20d}` : '',
      value.rs_rank_60d !== undefined ? `60日 ${value.rs_rank_60d}` : '',
      value.rs_rank_120d !== undefined ? `120日 ${value.rs_rank_120d}` : '',
      value.rs_label ? String(value.rs_label) : '',
    ].filter(Boolean);
    return parts.join(' / ');
  }
  if (key === 'eps_signal') {
    const parts = [
      value.latest_eps !== undefined ? `EPS ${value.latest_eps}` : '',
      value.eps_growth_yoy !== undefined ? `同比 ${formatPct(value.eps_growth_yoy)}` : '',
      value.eps_growth_label ? String(value.eps_growth_label) : '',
    ].filter(Boolean);
    return parts.join(' / ');
  }
  return '';
}

function renderResearchBox(title, item, fieldList) {
  if (!item) return '';
  const meta = [
    item.source_result_date ? `调研日 ${item.source_result_date}` : '',
    item.updated_at ? `更新 ${item.updated_at}` : '',
    item.label ? `标签 ${item.label}` : '',
  ].filter(Boolean).join(' · ');
  const fieldText = fieldList
    .map(([label, key]) => {
      const value = item[key];
      if (value === undefined || value === null || value === '') return '';
      if (typeof value === 'object') {
        const formattedValue = formatStructuredResearchValue(key, value);
        if (!formattedValue) return '';
        return `<span class="stock-library-pill">${esc(label)}: ${esc(formattedValue)}</span>`;
      }
      return `<span class="stock-library-pill">${esc(label)}: ${esc(value)}</span>`;
    })
    .filter(Boolean)
    .join('');
  return `
    <div class="stock-library-box">

      ${meta ? `<div class="stock-library-meta">${esc(meta)}</div>` : ''}

function bindStaticStockSearch(searchLibrary) {
  const input = document.getElementById('stockSearchInput');
  const button = document.getElementById('stockSearchButton');
  const result = document.getElementById('stockSearchResult');
  if (!input || !button || !result) return;
  const runSearch = async () => {
    const query = input.value;
    if (!normalizeSearchText(query)) {
      result.innerHTML = '';
      return;
    }
    result.innerHTML = '<div class="stock-library-box">正在读取 GitHub 数据库...</div>';
    const databaseMap = await loadStaticDatabaseMap();
    result.innerHTML = renderStaticSearchResult(
      findStockInSearchLibrary(query, searchLibrary),
      databaseMap,
    );
  };
  button.addEventListener('click', runSearch);
  input.addEventListener('keydown', event => {
    if (event.key === 'Enter') runSearch();
  });
  input.addEventListener('input', () => {
    if (normalizeSearchText(input.value).length >= 2) runSearch();
  });
}

              统计区间 ${esc(t10CoverageStart)} ~ ${esc(t10CoverageEnd)}
            </div>
          </div>
        </div>
      </div>`;
  }
  return `
    <div class="section">
      <h2>AI偏好股</h2>
      <div class="subtitle">
        About：统计主系统历史 Top8 中出现次数最多的 10 只股票，可作为重点观察池。<br>
        统计区间: ${esc(root.start_date || '-')} ~ ${esc(root.end_date || '-')}
        &nbsp;|&nbsp; 覆盖天数: ${esc(root.coverage_day_count ?? '-')}
      </div>
      <div class="ai-pref-layout">
        <div>
          ${stockList.map((stock, index) => `
            <div class="card">
              <div class="card-header">
                <span class="rank-badge ${index + 1 <= 3 ? 'rank-' + (index + 1) : ''}">${index + 1}</span>
                <span class="stock-name">${esc(stock.stock_name || '-')}</span>
                <span class="stock-code">${esc(stock.stock_code || '')}</span>
                <span class="score-badge score-mid">出现 ${esc(stock.appearance_count ?? '-')} 次</span>
              </div>
              <div class="meta">
                Top3 次数: ${esc(stock.top3_count ?? '-')}
                &nbsp;|&nbsp; 最佳排名: ${esc(stock.best_rank ?? '-')}
                &nbsp;|&nbsp; 平均排名: ${esc(stock.avg_rank ?? '-')}
                &nbsp;|&nbsp; 最近出现: ${esc(stock.last_seen_date || '-')}
                ${stock.primary_theme ? `&nbsp;|&nbsp; 主主题: ${esc(stock.primary_theme)}` : ''}
              </div>
              <div class="meta">
                首次推荐: ${esc(stock.first_recommend_date || '-')}
                &nbsp;|&nbsp; 距今涨幅: ${formatSignedPct(stock.return_since_first_recommend_pct)}
                &nbsp;|&nbsp; 区间最大涨幅: ${formatSignedPct(stock.max_return_since_first_recommend_pct)}
              </div>
            </div>
          `).join('')}
        </div>
        ${renderRecentHotSidebar()}
      </div>
    </div>`;
}

function toggleCollapse(el) {
  const content = el.nextElementSibling;
  const icon = el.querySelector('.collapse-icon');
  if (content.classList.contains('open')) {
    content.classList.remove('open');
    if (icon) icon.textContent = '▶';
  } else {
    content.classList.add('open');
    if (icon) icon.textContent = '▼';
  }
}

async function render() {
  const data = INLINE_ONEIL;
  const stockSelectionData = null;
  const futureData = INLINE_FUTURE;
  const themeData = INLINE_THEME;
  const openDipData = await loadJSON(OPEN_DIP_DB_URL) || INLINE_OPEN_DIP;
  const takeProfitData = await loadJSON(TAKE_PROFIT_DB_URL) || {take_profit_db: {}};
  const aiPreferenceData = await loadJSON(AI_PREFERENCE_STOCK_STATS_URL) || {ai_preference_stock_stats: {}};

  const app = document.getElementById('app');

  if (!data) {
    app.innerHTML = '<p style="color:var(--red)">无法加载数据，请确认 JSON 文件是否存在。</p>';
    return;
  }

  const root = data.oneil_top_stock_selection_result || {};
  const selected = root.selected_top_8 || [];
  const rejected = root.rejected_stocks || [];
  const searchIndexData = await loadJSON(STOCK_SEARCH_INDEX_URL) || {stock_list: []};
  const stopLossData = await loadJSON(STOP_LOSS_DB_URL) || {intraday_stop_loss_db: {}};
  const searchLibrary = buildSearchLibrary(root, searchIndexData);
  const summary = root.selection_summary || {};
  const sourceDate = root.source_result_date || '';
  const stockSelectionRoot = stockSelectionData ? (stockSelectionData.stock_selection_result || {}) : {};
  const stockSelectionDate = extractStockSelectionDate(stockSelectionRoot);
  const isFresh = !stockSelectionDate || !sourceDate || stockSelectionDate === sourceDate;
  const updateTimeText = getPublishedUpdateTime();

  let html = `
    <h1>AI智能股票推荐</h1>
    <div class="subtitle">
      更新时间: ${esc(updateTimeText)} &nbsp;|&nbsp;
      数据日期: ${esc(sourceDate)} &nbsp;|&nbsp; 交易周: ${esc(root.trade_week)} &nbsp;|&nbsp;
      候选池: ${root.source_candidate_count}只 → 入选: ${root.selected_count}只
      ${stockSelectionDate ? `&nbsp;|&nbsp; 最新粗筛: ${esc(stockSelectionDate)}` : ''}
      ${!isFresh ? `&nbsp;|&nbsp; <span class="freshness-warn">注意：最新粗筛为 ${esc(stockSelectionDate)}，推荐结果仍为 ${esc(sourceDate)}</span>` : ''}
    </div>`;

  html += renderThemes(themeData);
  html += renderFutureEvents(futureData);

  html += `<div class="section"><h2>推荐 Top 8</h2>`;
  html += selected.map(s => renderStock(s, openDipData, stopLossData, takeProfitData)).join('');
  html += `</div>`;

  html += renderAiPreferenceStockStats(aiPreferenceData);
  html += renderStaticStockSearch(searchLibrary);

  html += `<div class="footer">AI智能股票推荐 · 数据仅供参考，不构成投资建议</div>`;

  app.innerHTML = html;
  bindStaticStockSearch(searchLibrary);
}

function extractStockSelectionDate(stockSelectionRoot) {
  if (!stockSelectionRoot) return '';
  if (stockSelectionRoot.published_source_date) return stockSelectionRoot.published_source_date;
  if (stockSelectionRoot.source_result_date) return stockSelectionRoot.source_result_date;
  const tradeWeek = stockSelectionRoot.trade_week || '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(tradeWeek)) return tradeWeek;
  const candidates = stockSelectionRoot.candidate_stock_list || [];
  const firstCandidate = candidates[0] || {};
  const sourceDate = firstCandidate.source_result_date || '';
  return sourceDate;
}

render();
</script>
</body>
</html>
