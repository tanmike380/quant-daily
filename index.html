async function loadJSON(url) {
  try {
    const separator = url.includes('?') ? '&' : '?';
    const bustUrl = url + separator + '_t=' + Date.now();
    const r = await fetch(bustUrl);
    if (!r.ok) {
      console.error('fetch failed:', url, r.status, r.statusText);
      return null;
    }
    const data = await r.json();
    return data;
  } catch (e) {
    console.error('loadJSON error:', url, e);
    return null;
  }
}

function dimClass(label) {
  if (!label) return 'dim-medium';
  const l = label.toLowerCase();
  if (l === 'strong' || l === 'leader') return 'dim-strong';
  if (l === 'weak' || l === 'laggard' || l === 'concept_only') return 'dim-weak';
  return 'dim-medium';
}

function bucketClass(bucket) {
  if (bucket === 'A') return 'bucket-A';
  if (bucket === 'B') return 'bucket-B';
  return 'bucket-C';
}

function scoreClass(score) {
  if (score >= 80) return 'score-high';
  if (score >= 60) return 'score-mid';
  return 'score-low';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatPct(v) {
  if (v === null || v === undefined || v === '') return '-';
  const n = Number(v);
  if (!Number.isFinite(n)) return esc(v);
  return `${n.toFixed(2)}%`;
}

function findThresholdStat(signal, threshold) {
  const stats = signal.threshold_stat_list || [];
  return stats.find(item => Number(item.threshold_pct) === Number(threshold));
}

function renderIntradayStopLoss(signal) {
  if (!signal) return '';
  const optimal = formatPct(signal.optimal_stop_loss_pct);
  const expected = formatPct(signal.optimal_expected_value_pct);
  const confidence = signal.confidence_label || signal.status || '';
  const stat = findThresholdStat(signal, signal.optimal_stop_loss_pct) || {};
  const triggerText = stat.trigger_count !== undefined ? `触发 ${stat.trigger_count} 次` : '';
  const continueDown = stat.continue_down_probability !== undefined
    ? `继续下跌概率 ${formatPct(Number(stat.continue_down_probability) * 100)}`
    : '';
  const recovery = stat.v_recovery_probability !== undefined
    ? `V回概率 ${formatPct(Number(stat.v_recovery_probability) * 100)}`
    : '';
  return `
    <div class="stoploss-box">
      <span class="label">统计止损:</span> ${optimal} &nbsp;|&nbsp;
      <span class="label">期望值:</span> ${expected} &nbsp;|&nbsp;
      <span class="label">置信度:</span> ${esc(confidence)}<br>
      ${esc([triggerText, continueDown, recovery].filter(Boolean).join('；'))}
      ${signal.reason_text ? `<div style="margin-top:4px;color:var(--text2)">${esc(signal.reason_text)}</div>` : ''}
    </div>`;
}

function buildOpenDipReasonText(signal, stat) {
  const lookback = signal.lookback_trade_day_count;
  const threshold = formatPct(signal.optimal_open_dip_buy_pct);
  const triggerCount = stat.trigger_count;
  const triggerProbability = stat.trigger_probability !== undefined
    ? formatPct(Number(stat.trigger_probability) * 100)
    : '-';
  const avgReturn = formatPct(stat.avg_5d_close_return_pct);
  const entryCost = formatPct(signal.entry_cost_pct);
  const netReturn = formatPct(stat.avg_5d_close_net_return_pct);
  const executionExpected = formatPct(stat.swing_execution_expected_return_pct);
  const reboundRate = stat.same_day_rebound_probability !== undefined
    ? formatPct(Number(stat.same_day_rebound_probability) * 100)
    : '-';
  return `近${lookback || '-'}个交易日样本中，开盘后触发${threshold}低吸阈值的次数为${triggerCount || 0}，触发概率为${triggerProbability}；按该阈值买入并持有到T+5收盘的平均收益为${avgReturn}，扣除${entryCost}买入损耗后的T+5平均净收益为${netReturn}，按触发概率加权后的T+5执行期望为${executionExpected}，当日收盘高于开盘概率为${reboundRate}。`;
}

  if (!targetRange) return '证据不足';

    ? NaN : Number(targetRange.low);

    ? NaN : Number(targetRange.high);
  const center = targetRange.center === null || targetRange.center === undefined
    ? NaN : Number(targetRange.center);
  const currency = targetRange.currency || 'CNY';
  if (Number.isFinite(low) && Number.isFinite(high)) {
    return `${low}-${high} ${esc(currency)}`;

  if (Number.isFinite(center)) return `${center} ${esc(currency)}`;
  return '证据不足';
}

function buildSearchLibrary(root, searchIndexData) {
  const searchMap = {};
  function ensureStock(stockCode, stockName) {
    const code = String(stockCode || '').trim();
    if (!code) return null;
    if (!searchMap[code]) {
      searchMap[code] = { stock_code: code, stock_name: stockName || '', top_stock: null };
    }
    if (stockName && !searchMap[code].stock_name) searchMap[code].stock_name = stockName;
    return searchMap[code];
  }
  (root.selected_top_8 || []).forEach(stock => {
    const item = ensureStock(stock.stock_code, stock.stock_name);
    if (item) item.top_stock = stock;
  });
  ((searchIndexData && searchIndexData.stock_list) || []).forEach(stock => {
    ensureStock(stock.stock_code, stock.stock_name);
  });
  return searchMap;
}

function findStockInSearchLibrary(query, searchLibrary) {
  const q = normalizeSearchText(query);
  if (!q) return null;
  if (searchLibrary[q]) return searchLibrary[q];
  const stockList = Object.values(searchLibrary);
  return stockList.find(item => normalizeSearchText(item.stock_name) === q)
    || stockList.find(item => normalizeSearchText(item.stock_code).includes(q))
    || stockList.find(item => normalizeSearchText(item.stock_name).includes(q))
    || null;
}

function formatStructuredResearchValue(key, value) {
  if (!value || typeof value !== 'object') return value;
  if (key === 'relative_strength_signal') {
    const parts = [
      value.rs_composite_rank !== undefined ? `综合RS ${value.rs_composite_rank}` : '',
      value.rs_rank_20d !== undefined ? `20日 ${value.rs_rank_20d}` : '',
      value.rs_rank_60d !== undefined ? `60日 ${value.rs_rank_60d}` : '',
      value.rs_rank_120d !== undefined ? `120日 ${value.rs_rank_120d}` : '',
      value.rs_label ? String(value.rs_label) : '',
    ].filter(Boolean);
    return parts.join(' / ');
  }
  if (key === 'eps_signal') {
    const parts = [
      value.latest_eps !== undefined ? `EPS ${value.latest_eps}` : '',
      value.eps_growth_yoy !== undefined ? `同比 ${formatPct(value.eps_growth_yoy)}` : '',
      value.eps_growth_label ? String(value.eps_growth_label) : '',
    ].filter(Boolean);
    return parts.join(' / ');
  }
  return '';
}

function renderResearchBox(title, item, fieldList) {
  if (!item) return '';
  const meta = [
    item.source_result_date ? `调研日 ${item.source_result_date}` : '',
    item.updated_at ? `更新 ${item.updated_at}` : '',
    item.label ? `标签 ${item.label}` : '',
  ].filter(Boolean).join(' · ');
  const fieldText = fieldList
    .map(([label, key]) => {
      const value = item[key];
      if (value === undefined || value === null || value === '') return '';
      if (typeof value === 'object') {
        const formattedValue = formatStructuredResearchValue(key, value);
        if (!formattedValue) return '';
        return `<span class="stock-library-pill">${esc(label)}: ${esc(formattedValue)}</span>`;
      }
      return `<span class="stock-library-pill">${esc(label)}: ${esc(value)}</span>`;
    })
    .filter(Boolean)
    .join('');
  return `
    <div class="stock-library-box">
      <div class="stock-library-title">${esc(title)}</div>
      ${meta ? `<div class="stock-library-meta">${esc(meta)}</div>` : ''}
      ${fieldText ? `<div>${fieldText}</div>` : ''}
      ${item.reason_text ? `<div class="stock-library-text" style="margin-top:5px">${esc(item.reason_text)}</div>` : ''}
    </div>`;
}

function renderStaticTargetPriceCalculatorBox(record) {
  if (!record) return '';
  const signal = record.target_price_calculator_signal || {};
  const profile = signal.weight_profile_signal || {};
  const calculation = signal.target_price_calculation_signal || {};
  const meta = [
    record.updated_at ? `更新 ${record.updated_at}` : '',
    record.latest_trade_date ? `行情日 ${record.latest_trade_date}` : '',
    record.research_coverage_status ? `覆盖 ${record.research_coverage_status}` : '',
    profile.profile_name ? `模型 ${profile.profile_name}` : '',
    calculation.status ? `计算 ${calculation.status}` : '',
  ].filter(Boolean).join(' · ');
  return `
    <div class="target-price-box calculator" style="margin-top:8px">
      <div class="target-price-title">Calculator 目标区间 · ${esc(signal.confidence_label || 'insufficient_data')}</div>
      <div>${formatTargetRange(signal.predicted_target_price_range)}</div>
      <div class="target-price-meta">
        当前价: ${record.latest_close_price === null || record.latest_close_price === undefined ? '缺失' : esc(record.latest_close_price)}
        ${signal.predicted_upside_pct_range && signal.predicted_upside_pct_range.low !== undefined && signal.predicted_upside_pct_range.high !== undefined ? ` · 参考涨幅: ${formatPct(signal.predicted_upside_pct_range.low)}-${formatPct(signal.predicted_upside_pct_range.high)}` : ''}
      </div>
      ${meta ? `<div class="target-price-meta">${esc(meta)}</div>` : ''}
      ${signal.reason_text ? `<div class="target-price-meta">${esc(signal.reason_text)}</div>` : ''}
    </div>`;
}

function renderStaticSearchResult(record, databaseMap) {
  if (!record) {

  const stock = record.top_stock || {};
  const code = String(record.stock_code || '').trim();
  const canSlim = (databaseMap.can_slim_research_db || {})[code] || {};
  const institutional = canSlim.institutional_sponsorship || {};
  const targetView = institutional.institutional_target_price_view || {};
  const stopSignal = ((databaseMap.intraday_stop_loss_db || {})[code] || {}).intraday_stop_loss_signal || stock.intraday_stop_loss_signal || null;

  const topStatus = stock.stock_code

    <div class="stock-library-box">

        <span class="stock-code">${esc(record.stock_code)}</span>
        <span class="score-badge ${stock.stock_code ? 'score-high' : 'score-mid'}">${esc(topStatus)}</span>
      </div>
      ${renderStaticTargetPriceCalculatorBox(targetCalculatorRecord)}
      ${stock.target_price_judgment || stock.oneil_calculator_signal ? renderTargetPriceJudgment(stock.target_price_judgment, stock.oneil_calculator_signal) : ''}

        <div class="target-price-box">
          <div class="target-price-title">投研团队目标区间 · ${esc(targetView.evidence_freshness_label || 'insufficient_data')}</div>
          <div>${formatTargetRange(expertRange)}</div>
          ${targetView.source_name ? `<div class="target-price-meta">来源: ${esc(targetView.source_name)} · ${esc(targetView.source_observed_at || '')}</div>` : ''}
          ${targetView.reason_text ? `<div class="target-price-meta">${esc(targetView.reason_text)}</div>` : ''}
        </div>` : ''}
      ${renderOpenDipSignal({stock_code: code}, {open_dip_buy_db: {[code]: {open_dip_buy_signal: openDipSignal}}})}
      ${renderIntradayStopLoss(stopSignal)}
    </div>
    <div class="stock-library-grid">
      ${renderResearchBox('C 当前业绩', canSlim.current_earnings, [
        ['营收增速', 'latest_revenue_growth'],
        ['利润增速', 'latest_profit_growth'],
        ['扣非增速', 'deducted_profit_growth'],
        ['现金流/利润', 'operating_cashflow_to_profit_ratio'],
      ])}
      ${renderResearchBox('A 年度成长', canSlim.annual_growth, [
        ['营收CAGR', 'revenue_cagr_3y'],
        ['净利CAGR', 'profit_cagr_3y'],
        ['ROE', 'roe_status'],
        ['成长类型', 'growth_type_label'],
      ])}
      ${renderResearchBox('N 新变量', canSlim.new_factor, [
        ['技术/产品', 'new_product_or_technology_text'],
        ['订单/客户', 'new_order_or_customer_text'],
        ['产能', 'new_capacity_text'],
        ['新业务占比', 'new_business_revenue_share_text'],
      ])}
      ${renderResearchBox('S 供需承接', canSlim.supply_demand, [
        ['20日成交额', 'amount_avg_20d'],
        ['20日换手', 'turnover_rate_avg_20d'],
        ['20日涨幅', 'price_change_20d'],
        ['RS', 'relative_strength_signal'],
      ])}
      ${renderResearchBox('L 龙头/后排', canSlim.leader_laggard, [
        ['行业地位', 'industry_position_text'],
        ['主线纯度', 'main_theme_purity_status'],
        ['板块辨识度', 'board_recognition_status'],
        ['同主题比较', 'same_theme_comparison_text'],

}

function renderStaticStockSearch(searchLibrary) {
  const count = Object.keys(searchLibrary || {}).length;
  return `
    <div class="section">
      <h2>静态股票库查询</h2>
      <div class="stock-search-panel">
        <div class="stock-search-row">
          <input id="stockSearchInput" class="stock-search-input" placeholder="输入股票代码或名称，例如 601138 / 工业富联">
          <button id="stockSearchButton" class="stock-search-button">查询</button>
        </div>
        <div class="stock-search-hint">已加载 ${count} 只股票索引；查询时会从 GitHub 数据库读取目标区间、统计低吸、统计止损、CAN/SLIM 调研日期与描述。</div>
        <div id="stockSearchResult" class="stock-search-result"></div>
      </div>
    </div>`;
}

function bindStaticStockSearch(searchLibrary) {
  const input = document.getElementById('stockSearchInput');
  const button = document.getElementById('stockSearchButton');
  const result = document.getElementById('stockSearchResult');
  if (!input || !button || !result) return;
  const runSearch = async () => {
    const query = input.value;
    if (!normalizeSearchText(query)) {
      result.innerHTML = '';
      return;
    }
    result.innerHTML = '<div class="stock-library-box">正在读取 GitHub 数据库...</div>';
    const databaseMap = await loadStaticDatabaseMap();
    result.innerHTML = renderStaticSearchResult(
      findStockInSearchLibrary(query, searchLibrary),
      databaseMap,
    );
  };
  button.addEventListener('click', runSearch);
  input.addEventListener('keydown', event => {
    if (event.key === 'Enter') runSearch();
  });
  input.addEventListener('input', () => {
    if (normalizeSearchText(input.value).length >= 2) runSearch();
  });
}

function renderStock(stock, openDipData, stopLossData) {
  const rank = stock.final_rank || 0;
  const verdict = stock.oneil_canslim_verdict || {};
  const why = stock.why_selected || [];
  const risk = stock.risk_judgment || {};
  const op = stock.operation_view || {};
  const stopLossSignal = findStopLossSignal(stock.stock_code, stopLossData) || stock.intraday_stop_loss_signal || null;
  const themes = stock.matched_theme_list || [];
  const gaps = stock.evidence_gap || [];
  const targetPriceJudgment = stock.target_price_judgment || null;
  const calculatorSignal = stock.oneil_calculator_signal || null;

  return `
  <div class="card">
    <div class="card-header">
      <span class="rank-badge ${rank <= 3 ? 'rank-' + rank : ''}">${rank}</span>
      <span class="stock-name">${esc(stock.stock_name)}</span>
      <span class="stock-code">${esc(stock.stock_code)}</span>
      <span class="score-badge ${scoreClass(stock.oneil_candidate_score)}">O'Neil ${stock.oneil_candidate_score}</span>
      <span class="score-badge ${bucketClass(stock.final_bucket)}">Bucket ${stock.final_bucket}</span>
      <span class="score-badge" style="background:rgba(188,140,255,0.12);color:var(--purple)">SS ${stock.selection_score}</span>
    </div>
    <div style="margin-bottom:6px">${themes.map(t => `<span class="theme-tag">${esc(t)}</span>`).join('')}
      <span class="theme-tag" style="background:rgba(240,136,62,0.12);color:var(--orange)">${esc(stock.primary_theme)}</span>
    </div>
    ${renderCANSLIM(verdict)}
    ${renderTargetPriceJudgment(targetPriceJudgment, calculatorSignal)}
    <div class="collapsible" onclick="toggleCollapse(this)">
      <strong style="font-size:0.85em">入选理由</strong><span class="collapse-icon">▶</span>
    </div>
    <div class="collapsible-content">
      <div class="why-list">${why.map(w => `<div class="why-item">${esc(w)}</div>`).join('')}</div>
      ${risk.main_risk_text ? `<div class="risk-text">⚠ ${esc(risk.main_risk_text)}</div>` : ''}
      <div class="operation-box">
        <span class="label">操作:</span> ${esc(op.action)}<br>
        <span class="label">失效:</span> ${esc(op.invalid_condition)}
      </div>
      ${renderOpenDipSignal(stock, openDipData)}
      ${renderIntradayStopLoss(stopLossSignal)}
      ${gaps.length ? `<div style="margin-top:6px;font-size:0.72em;color:var(--yellow)">证据缺口: ${gaps.map(g => esc(g)).join('；')}</div>` : ''}
    </div>
  </div>`;
}

function renderRejected(stocks) {
  if (!stocks || !stocks.length) return '';
  return `
  <div class="section">
    <h2 class="collapsible" onclick="toggleCollapse(this)">淘汰候选 (${stocks.length})<span class="collapse-icon">▶</span></h2>
    <div class="collapsible-content">
      <table class="rejected-table">
        <tr><th>股票</th><th>O'Neil分</th><th>SS</th><th>主线</th><th>淘汰原因</th></tr>
        ${stocks.map(s => `<tr>
          <td>${esc(s.stock_name)}<br><span style="color:var(--text2)">${esc(s.stock_code)}</span></td>
          <td>${s.oneil_candidate_score || '-'}</td>
          <td>${s.selection_score || '-'}</td>
          <td>${esc(s.primary_theme)}</td>
          <td style="max-width:300px">${esc(s.main_reject_reason)}</td>
        </tr>`).join('')}
      </table>
    </div>
  </div>`;
}

function renderThemes(themeData) {
  if (!themeData) return '';
  const themes = themeData.theme_list || [];
  if (!themes.length) return '';
  return `
  <div class="section">
    <h2>周度主线</h2>
    <div class="theme-bar">
      ${themes.map(t => `<div class="theme-card">
        <div class="theme-rank">#${t.rank_no}</div>
        <div class="theme-name">${esc(t.theme_name)}</div>
        <div class="theme-type">${esc(t.strength_level)}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderFutureEvents(futureData) {
  if (!futureData) return '';
  const root = futureData.future_events_scan_result;
  if (!root) return '';
  const events = root.event_list || [];
  if (!events.length) return '';
  return `
  <div class="section">
    <h2>下月前瞻事件 (${esc(root.target_month)})</h2>
    <div class="event-list">
      ${events.map(e => `<div class="event-item">
        <span class="event-date">${esc(e.event_date)}</span>
        <span class="event-name">${esc(e.event_name)}</span>
        <span class="event-themes">${(e.catalyzed_theme_list||[]).map(t => esc(t.catalyzed_theme_name)).join('、')}</span>
      </div>`).join('')}
    </div>
    <div style="margin-top:6px;font-size:0.75em;color:var(--text2)">${esc(root.summary_text)}</div>
  </div>`;
}

function boardIntentScoreClass(score) {
  const numericScore = Number(score);
  if (numericScore >= 70) return 'score-high';
  if (numericScore >= 50) return 'score-mid';
  return 'score-low';
}

function formatBoardThemeList(themeSignal) {
  const themeList = themeSignal && themeSignal.matched_current_theme_list
    ? themeSignal.matched_current_theme_list
    : [];
  if (!themeList.length) return '<span class="theme-tag">主线证据不足</span>';
  return themeList.map(themeName => `<span class="theme-tag">${esc(themeName)}</span>`).join('');
}

function renderBoardStockCard(stock) {
  const signal = stock.capital_intent_prediction_signal || {};
  const themeSignal = signal.theme_intent_signal || {};
  const washSignal = signal.wash_or_distribution_signal || {};
  const fundingSignal = signal.funding_willingness_signal || {};
  const carrierSignal = signal.speculation_carrier_signal || {};
  const setup = stock.pre_ignition_setup || {};
  return `
    <div class="board-stock-card">
      <div class="card-header" style="margin-bottom:6px">
        <span class="rank-badge">${esc(stock.rank || '-')}</span>
        <span class="stock-name">${esc(stock.stock_name || '-')}</span>
        <span class="stock-code">${esc(stock.stock_code || '')}</span>
        <span class="score-badge ${boardIntentScoreClass(signal.capital_intent_score)}">意愿 ${esc(signal.capital_intent_score || '-')}</span>
      </div>
      <div>${formatBoardThemeList(themeSignal)}</div>
      <div class="board-stock-meta">
        ${esc(signal.capital_intent_label || '-')} · ${esc(signal.ignition_probability_1_3d || '-')} · ${esc(signal.prediction_type || '-')}
      </div>
      <div class="board-stock-line">
        洗盘/出货: ${esc(washSignal.wash_or_distribution_label || '-')}
        · 5/10/20日: ${formatPct(setup.pct_change_5d)} / ${formatPct(setup.pct_change_10d)} / ${formatPct(setup.pct_change_20d)}
      </div>
      <div class="board-stock-line">
        资金: ${esc(fundingSignal.funding_willingness_label || '-')}
        · 60日涨停 ${esc(fundingSignal.limit_up_count_60d ?? '-')} 次
        · 20日均额 ${esc(fundingSignal.avg_amount_20d_yi ?? '-')} 亿
      </div>
      <div class="board-stock-line">
        载体: ${esc(carrierSignal.carrier_label || '-')}
        · 流通市值 ${esc(carrierSignal.latest_circ_mv_yi ?? '-')} 亿
        · 20日换手 ${formatPct(carrierSignal.avg_turnover_rate_20d)}
      </div>
      ${signal.why_capital_may_choose_it ? `<div class="board-stock-reason">${esc(signal.why_capital_may_choose_it)}</div>` : ''}
      ${signal.failure_condition ? `<div class="board-stock-risk">失效: ${esc(signal.failure_condition)}</div>` : ''}
    </div>`;
}

function renderBoardStockCapitalIntent(boardStockData) {
  const root = boardStockData && boardStockData.board_stock_capital_intent_prediction_result
    ? boardStockData.board_stock_capital_intent_prediction_result
    : {};
  const candidateList = root.candidate_list || [];
  if (!candidateList.length) return '';
  const visibleList = candidateList.slice(0, 20);
  const summary = root.summary || {};
  const resultDate = root.result_date || root.published_source_date || '';
  const themeList = ((root.theme_context || {}).theme_pool || [])
    .map(theme => theme.theme_name)
    .filter(Boolean);
  return `
    <div class="section">
      <h2>短线资金意愿 / 打板候选</h2>
      <div class="subtitle">
        数据日期: ${esc(resultDate)} &nbsp;|&nbsp; 展示前 ${visibleList.length} / ${candidateList.length} 只
        ${themeList.length ? `&nbsp;|&nbsp; 当前主线: ${themeList.map(themeName => esc(themeName)).join('、')}` : ''}
      </div>
      ${summary.summary_text ? `<div class="card" style="font-size:0.78em;color:var(--text2)">${esc(summary.summary_text)}</div>` : ''}
      <div class="board-stock-grid">
        ${visibleList.map(renderBoardStockCard).join('')}
      </div>
    </div>`;
}

function toggleCollapse(el) {
  const content = el.nextElementSibling;
  const icon = el.querySelector('.collapse-icon');
  if (content.classList.contains('open')) {
    content.classList.remove('open');
    if (icon) icon.textContent = '▶';
  } else {
    content.classList.add('open');
    if (icon) icon.textContent = '▼';
  }
}

async function render() {
  const data = INLINE_ONEIL;
  const stockSelectionData = null;
  const futureData = INLINE_FUTURE;
  const themeData = INLINE_THEME;
  const openDipData = await loadJSON(OPEN_DIP_DB_URL) || INLINE_OPEN_DIP;
  const boardStockData = await loadJSON(BOARD_STOCK_DB_URL) || {board_stock_capital_intent_prediction_result: {}};

  const app = document.getElementById('app');

  if (!data) {
    app.innerHTML = '<p style="color:var(--red)">无法加载数据，请确认 JSON 文件是否存在。</p>';
    return;
  }

  const root = data.oneil_top_stock_selection_result || {};
  const selected = root.selected_top_8 || [];
  const rejected = root.rejected_stocks || [];
  const searchIndexData = await loadJSON(STOCK_SEARCH_INDEX_URL) || {stock_list: []};
  const stopLossData = await loadJSON(STOP_LOSS_DB_URL) || {intraday_stop_loss_db: {}};
  const searchLibrary = buildSearchLibrary(root, searchIndexData);
  const summary = root.selection_summary || {};
  const sourceDate = root.source_result_date || '';
  const stockSelectionRoot = stockSelectionData ? (stockSelectionData.stock_selection_result || {}) : {};
  const stockSelectionDate = extractStockSelectionDate(stockSelectionRoot);
  const isFresh = !stockSelectionDate || !sourceDate || stockSelectionDate === sourceDate;
  const freshnessClass = isFresh ? 'freshness-ok' : 'freshness-warn';
  const freshnessText = isFresh
    ? 'O’Neil 已对齐最新粗筛'
    : `注意：最新粗筛为 ${stockSelectionDate}，O’Neil 仍为 ${sourceDate}`;

  let html = `
    <h1>O'Neil / CAN SLIM Top 8</h1>
    <div class="subtitle">
      数据日期: ${esc(sourceDate)} &nbsp;|&nbsp; 交易周: ${esc(root.trade_week)} &nbsp;|&nbsp;
      候选池: ${root.source_candidate_count}只 → 入选: ${root.selected_count}只
      ${stockSelectionDate ? `&nbsp;|&nbsp; 最新粗筛: ${esc(stockSelectionDate)}` : ''}
      &nbsp;|&nbsp; <span class="${freshnessClass}">${esc(freshnessText)}</span>
    </div>`;

  html += renderThemes(themeData);
  html += renderFutureEvents(futureData);
  html += renderBoardStockCapitalIntent(boardStockData);
  html += renderStaticStockSearch(searchLibrary);

  html += `<div class="section"><h2>入选 Top 8</h2>`;
  html += selected.map(s => renderStock(s, openDipData, stopLossData)).join('');
  html += `</div>`;

  html += renderRejected(rejected);

  if (summary.summary_text) {
    html += `<div class="section"><div class="card" style="font-size:0.8em;color:var(--text2)">${esc(summary.summary_text)}</div></div>`;
  }

  html += `<div class="footer">大A智能体 · O'Neil/CAN SLIM 研究系统 · 数据仅供参考，不构成投资建议</div>`;

  app.innerHTML = html;
  bindStaticStockSearch(searchLibrary);
}

function extractStockSelectionDate(stockSelectionRoot) {
  if (!stockSelectionRoot) return '';
  if (stockSelectionRoot.published_source_date) return stockSelectionRoot.published_source_date;
  if (stockSelectionRoot.source_result_date) return stockSelectionRoot.source_result_date;
  const tradeWeek = stockSelectionRoot.trade_week || '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(tradeWeek)) return tradeWeek;
  const candidates = stockSelectionRoot.candidate_stock_list || [];
  const firstCandidate = candidates[0] || {};
  const sourceDate = firstCandidate.source_result_date || '';
  return sourceDate;
}

render();
